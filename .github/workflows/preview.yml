name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

# Share with pages.yml so all writers to gh-pages run one at a time.
# Do not cancel in-progress deploys — a cancelled mid-push can leave
# gh-pages inconsistent and pile up GitHub Pages builds.
concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  pages: write

jobs:
  deploy-preview:
    # Same-repo PRs only — fork PRs must not write to gh-pages.
    # Preview URLs share the production github.io origin; treat them as untrusted.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Legacy GitHub Pages builds fail immediately (duration 0, "Page build failed")
      # when gh-pages doubles the site under pr-preview/pr-N/ (~800+ files / ~23MB).
      # Ship UI-only previews and read live weather JSON from production /cowx/data.
      - name: Slim preview payload
        if: github.event.action != 'closed'
        run: |
          set -euo pipefail
          rm -rf public/data
          if [[ -d public/data ]]; then
            echo "::error::public/data still present after slim step"
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path
          root = Path("public/js")
          replacements = [
              ("const DATA_BASE = 'data'", "const DATA_BASE = '/cowx/data'"),
              ("?? 'data'", "?? '/cowx/data'"),
              ("?? \"data\"", "?? \"/cowx/data\""),
              ("'data/alerts.geojson'", "'/cowx/data/alerts.geojson'"),
              ("'data/cwop.geojson'", "'/cowx/data/cwop.geojson'"),
          ]
          patched = 0
          for path in root.rglob("*.js"):
              text = path.read_text()
              orig = text
              for old, new in replacements:
                  text = text.replace(old, new)
              if text != orig:
                  path.write_text(text)
                  patched += 1
                  print(f"patched {path}")
          if patched < 1:
              raise SystemExit("expected to patch DATA_BASE in public/js/app.js")
          app = (root / "app.js").read_text()
          if "DATA_BASE = '/cowx/data'" not in app:
              raise SystemExit("app.js DATA_BASE was not rewritten to /cowx/data")
          print(f"slim ok ({patched} file(s) patched, public/data removed)")
          PY

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: public
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          qr-code: true

      - name: Verify GitHub Pages build
        if: github.event.action != 'closed'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          tip="$(git rev-parse origin/gh-pages)"
          bash scripts/ci/wait-for-pages-build.sh "${tip}"
