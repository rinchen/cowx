name: Update Weather

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: update-weather
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      # Only the weather orchestrator step — not install/commit/push races.
      fetch_failed: ${{ steps.weather_fetch.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch weather data
        id: weather_fetch
        env:
          PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
          COTRIP_API_KEY: ${{ secrets.COTRIP_API_KEY }}
        # Must use `pnpm run fetch` / `fetch:data` — bare `pnpm fetch` is pnpm's
        # lockfile package-download builtin and never runs the weather orchestrator.
        run: pnpm run fetch:data

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/data; then
            echo "No data changes to commit"
            exit 0
          fi
          git add public/data
          git commit -m "chore: update weather data"
          # Concurrent pushes (code commits or overlapping schedules) can reject a
          # bare push; rebase onto remote main and retry a few times.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/main"
            git pull --rebase origin main
          done
          echo "Failed to push data commit after retries"
          exit 1

  # Commits made with GITHUB_TOKEN do not trigger pages.yml (GitHub recursion
  # guard). Deploy public/ here so scheduled weather updates reach the live site.
  deploy-pages:
    needs: fetch
    if: needs.fetch.result == 'success' && needs.fetch.outputs.fetch_failed != 'true'
    runs-on: ubuntu-latest
    # Serialize with pages.yml / preview.yml writers to gh-pages.
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Strip weather data from existing PR previews
        run: bash scripts/ci/ensure-slim-pr-previews.sh

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: public
          clean: true
          clean-exclude: pr-preview

      - name: Verify GitHub Pages build
        id: verify_pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          tip="$(git rev-parse origin/gh-pages)"
          bash scripts/ci/wait-for-pages-build.sh "${tip}"

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: [fetch, deploy-pages]
    # Discord when weather fetch fails OR Pages publish verification fails.
    # Skip install/push races after a successful fetch (deploy-pages skipped).
    if: |
      always() && (
        needs.fetch.outputs.fetch_failed == 'true' ||
        needs.deploy-pages.result == 'failure'
      )
    steps:
      - name: Post Discord notification
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          FETCH_FAILED: ${{ needs.fetch.outputs.fetch_failed }}
          DEPLOY_RESULT: ${{ needs.deploy-pages.result }}
        run: |
          if [ -z "$NOTIFY_WEBHOOK_URL" ]; then
            echo "NOTIFY_WEBHOOK_URL not configured, skipping Discord notification"
            exit 0
          fi
          reason="unknown failure"
          if [ "$FETCH_FAILED" = "true" ]; then
            reason="weather fetch failed"
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            reason="gh-pages deploy or Pages build verification failed"
          fi
          payload=$(jq -n \
            --arg content "COWX ${reason}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{content: $content}')
          curl --max-time 15 -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$NOTIFY_WEBHOOK_URL"
