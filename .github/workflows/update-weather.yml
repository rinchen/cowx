name: Update Weather

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-weather
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      # Only the weather orchestrator step — not install/commit/push races.
      fetch_failed: ${{ steps.weather_fetch.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch weather data
        id: weather_fetch
        env:
          PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        # Must use `pnpm run fetch` / `fetch:data` — bare `pnpm fetch` is pnpm's
        # lockfile package-download builtin and never runs the weather orchestrator.
        run: pnpm run fetch:data

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/data; then
            echo "No data changes to commit"
            exit 0
          fi
          git add public/data
          # Do not use [skip ci]: Pages must redeploy so the live site gets fresh JSON.
          git commit -m "chore: update weather data"
          # Concurrent pushes (code commits or overlapping schedules) can reject a
          # bare push; rebase onto remote main and retry a few times.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/main"
            git pull --rebase origin main
          done
          echo "Failed to push data commit after retries"
          exit 1

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: fetch
    # Discord only when the weather data pull itself failed — not checkout,
    # install, prettier hooks, or git push races after a successful fetch.
    if: needs.fetch.outputs.fetch_failed == 'true'
    steps:
      - name: Post Discord notification
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$NOTIFY_WEBHOOK_URL" ]; then
            echo "NOTIFY_WEBHOOK_URL not configured, skipping Discord notification"
            exit 0
          fi
          payload=$(jq -n \
            --arg content "COWX weather fetch failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{content: $content}')
          curl --max-time 15 -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$NOTIFY_WEBHOOK_URL"
