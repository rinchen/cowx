name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Share with preview.yml and update-weather.yml deploy-pages so all writers
# to gh-pages run one at a time (avoids Pages build queue stampede).
# Scheduled weather data is deployed from update-weather.yml — GITHUB_TOKEN
# bot pushes to main do not trigger this workflow.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: public
          clean: true
          clean-exclude: pr-preview
